<!DOCTYPE html>
<html lang="es-LA">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For you my sweet</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- ================= LOGIN ================= -->

    <div class="login">

        <div class="login-card">

            <h2>Bienvenida mi amor ❤️</h2>

            <p>Para continuar responde estas dos preguntitas jeje</p>

            <input
                type="text"
                id="usuario"
                placeholder="Ingresa tu usuario/apodo">

            <input
                type="password"
                id="contraseña"
                placeholder="Ingresa tus números favoritos">

            <button id="entrar">

                Entrar

            </button>

            <p id="mensaje"></p>

        </div>

    </div>

    <!-- ================= PANTALLA DE CARGA ================= -->

    <div class="pantalla-carga">

        <div class="corazon">

            ❤️

        </div>

        <p id="textoCarga">

            Preparando una sorpresa... (Baja el volumen si lo tienes alto :b)

        </p>

    </div>

    <!-- ================= ANIVERSARIO ================= -->

    <div class="aniversario">

        <div class="contenedor">

            <h1>Te amo mucho ❤️</h1>

            <p>

                Feliz aniversario mi amor.

            </p>

            <a
            href="https://www.youtube.com/watch?v=eTKeQhYVvbQ"
            class="boton-redireccion"
            target="_blank">

                Click aquí para ver un video especial

            </a>

        </div>

    </div>

    <!-- ================= TARJETA DE MÚSICA ================= -->

    <div class="musica">

        <div class="musica-header">

            <button id="abrir-musica">

                🎵

            </button>

            <button id="cerrar-musica">

                —

            </button>

        </div>

        <div class="contenido-musica">

            <h3>

                I Love You Too Much

            </h3>

            <p>

                The Book Of Life

            </p>

            <div class="volumen">

                <div class="nivel activo" data-vol="1"></div>
                <div class="nivel activo" data-vol="2"></div>
                <div class="nivel activo" data-vol="3"></div>
                <div class="nivel activo" data-vol="4"></div>
                <div class="nivel activo" data-vol="5"></div>

                <div class="nivel" data-vol="6"></div>
                <div class="nivel" data-vol="7"></div>
                <div class="nivel" data-vol="8"></div>
                <div class="nivel" data-vol="9"></div>
                <div class="nivel" data-vol="10"></div>

            </div>

        </div>

    </div>

    <!-- ================= AUDIO ================= -->

    <audio id="audio" loop>

        <source
        src="cancion.mp3"
        type="audio/mpeg">

    </audio>

    <script src="script.js"></script>

</body>
</html>
